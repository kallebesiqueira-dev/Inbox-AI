name: Keep-alive

# Backup anti cold-start: ping dell'health check con cron ogni 5 minuti (GitHub
# li esegue con ritardi anche di 20+ minuti, quindi NON è il meccanismo primario:
# il backend si auto-pinga già tramite RENDER_EXTERNAL_URL, vedi index.ts).
# NB: GitHub disattiva i workflow schedulati dopo 60 giorni senza attività nel repo.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health
        run: curl -fsS -m 60 https://inbox-ai-mwca.onrender.com/api/health || true
