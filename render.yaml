services:
  - type: web
    name: inbox-ai-api
    runtime: node
    rootDir: backend
    plan: free
    # NODE_ENV=production fa sì che npm ometta le devDependencies (TypeScript, @types/*).
    # --include=dev le forza in fase di build (servono solo per compilare).
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: VERCEL_PROJECT
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: default
      - key: AI_API_KEY
        sync: false
