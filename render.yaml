services:
  - type: web
    name: inbox-ai-api
    runtime: node
    rootDir: backend
    plan: free
    # NODE_ENV=production fa sì che npm ometta le devDependencies (TypeScript, @types/*).
    # --include=dev le forza in fase di build (servono solo per compilare).
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    # Il deploy passa dal CI (hook dopo build+test verdi): l'autoDeploy del
    # repo collegato salterebbe i test e produrrebbe deploy doppi.
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: VERCEL_PROJECT
        sync: false
      - key: MONGODB_URI
        sync: false
      # ATTENZIONE: mai rigenerare automaticamente. La chiave AES dei token
      # Gmail è derivata da JWT_SECRET: ruotarlo invalida tutte le sessioni E
      # rende indecifrabili i token Gmail salvati (tutti dovrebbero ricollegare
      # la casella).
      - key: JWT_SECRET
        sync: false
      # Per usare Groq: impostare AI_PROVIDER=groq e AI_API_KEY con la chiave.
      - key: AI_PROVIDER
        value: default
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        sync: false
      # Per l'accesso con Google: lo stesso Client ID del frontend.
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Per il collegamento Gmail (OAuth code flow).
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # SMTP per le email di sistema (reset password): Gmail + app password.
      - key: GMAIL_APP_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      # Stripe (pagamenti): senza chiavi il checkout resta in modalità demo.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
